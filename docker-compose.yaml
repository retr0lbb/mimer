version: "3.9"

services:
  postgres:
    image: bitnami/postgresql:latest
    container_name: mimer-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRESQL_USERNAME: mimer_user
      POSTGRESQL_PASSWORD: mimer_password
      POSTGRESQL_DATABASE: mimer_db
    volumes:
      - postgres_data:/bitnami/postgresql
    networks:
      - mimer-network

  waha:
    image: devlikeapro/waha:latest
    container_name: mimer-waha
    restart: always
    ports:
      - "3000:3000"
    environment:
      - WAHA_WORKER_ID=waha
      - WAHA_PRINT_QR=False
    volumes:
      - waha_sessions:/app/.sessions
    networks:
      - mimer-network

volumes:
  postgres_data:
  waha_sessions:

networks:
  mimer-network:
    driver: bridge